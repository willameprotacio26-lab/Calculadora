<html>
    <head>
        <title> calculadora </title>
        <meta charset="utf-8"/>
        <script src="calculadora.js"></script>
        <link rel="stylesheet" href="calculadora.css" />
    </head>
    <body>
        <div style="padding: 14px; margin: 14px; width: 280px; ;">
            <h1>Calculadora</h1>
            <p>Essa é minha nova calculadora</p> 
            <div id="entradas">
                <div class="campo">
                    <label for="fatorA">Numero A:</label> <input id="fatorA"type="number"/>
                </div>
                <div class="campo">
                    <label for="fatorB">Numero B:</label> <input id="fatorB"type="number"/>
                </div>
            </div>
            <div class="botoes">  
                <button onclick="soma()">+</button>
                    <button onclick="subtracao()">-</button>
                        <button onclick="multiplicacao()">*</button>
                                <button onclick="divisao()">/</button>
            </div>
            <div>
                Resultado: <span id="resultado"> </span>
            </div>
        </div>
    </body>
</html>
